<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-white">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MailMelt - Temp Mail Web Site</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen flex flex-col items-center p-6 neon-bg">
    <div class="max-w-3xl w-full">
        <header class="mb-6 text-center">
            <h1 class="text-5xl font-extrabold neon-text mb-2">MailMelt</h1>
            <p class="text-gray-400 text-lg">It is a Temp Mail Web Site</p>
            <p class="text-gray-400 text-sm mt-1">Created By Sayantan Saha</p>
        </header>

        <section id="email-section" class="mb-6">
            <div class="mb-4">
                <label for="preferred-name" class="block mb-1 font-semibold neon-text">Preferred Name:</label>
                <input type="text" id="preferred-name" placeholder="Enter your preferred name" class="w-full px-4 py-2 rounded-lg bg-gray-800 text-white neon-glow focus:outline-none focus:ring-2 focus:ring-green-400" />
            </div>
            <div class="flex items-center space-x-4">
                <span id="email-badge" class="bg-gray-800 px-4 py-2 rounded-lg font-mono text-lg cursor-pointer select-all neon-glow" title="Click to copy email">No email generated</span>
                <button id="copy-btn" class="bg-blue-600 hover:bg-blue-700 px-3 py-2 rounded-md neon-button" title="Copy email to clipboard">Copy</button>
                <button id="generate-btn" class="bg-green-600 hover:bg-green-700 px-3 py-2 rounded-md neon-button" title="Generate new temp email">Generate</button>
                <button id="delete-btn" class="bg-red-600 hover:bg-red-700 px-3 py-2 rounded-md neon-button" title="Delete current temp email">Delete</button>
            </div>
            <div class="mt-2 text-sm text-gray-400">
                <span>Expires in: </span><span id="countdown">--:--</span>
            </div>
        </section>

        <section id="inbox-section" class="bg-gray-800 rounded-lg p-4 max-h-96 overflow-y-auto neon-glow">
            <h2 class="text-3xl font-semibold mb-4 neon-text">Inbox</h2>
            <div id="inbox-list" class="space-y-3">
                <p class="text-gray-500">No emails yet.</p>
            </div>
            <div class="mt-4 flex justify-end space-x-2">
                <button id="refresh-btn" class="bg-yellow-600 hover:bg-yellow-700 px-3 py-2 rounded-md neon-button" title="Refresh inbox">Refresh</button>
                <label class="flex items-center space-x-2 cursor-pointer neon-text" title="Toggle auto-refresh">
                    <input type="checkbox" id="auto-refresh-toggle" />
                    <span>Auto Refresh</span>
                </label>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
